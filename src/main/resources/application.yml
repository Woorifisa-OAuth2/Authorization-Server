server:
  port: 9000

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server.servlet.session.cookie:
  same-site: lax
  http-only: true

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE